services:
  nginx:
    image: nginx:1.27-alpine
    container_name: dr-nginx
    networks:
      depth-net:
        ipv4_address: 172.30.0.10
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: "no"

  tcpdump:
    image: nicolaka/netshoot:latest
    container_name: dr-tcpdump
    cap_add: [NET_ADMIN, NET_RAW]
    # Share nginx network namespace — docker bridges aren't broadcast,
    # so a sidecar on the same bridge can't see other containers' traffic.
    network_mode: "service:nginx"
    volumes:
      - ./pcap:/pcap
    command: sh -c "tcpdump -i eth0 -U -w /pcap/traffic.pcap 'tcp port 80'"
    depends_on: [nginx]

networks:
  depth-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
