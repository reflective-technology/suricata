name: Pull Request Build
on:
  pull_request:
    branches:
      - main
env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}
jobs:
  build-image:
    name: build image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          images: ${{ env.REGISTRY_IMAGE }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        with:
          buildkitd-config-inline: ${{ vars.BUILDKITD_CONFIG }}
      - name: Login to GitHub Container Registry
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          platforms: linux/amd64
          provenance: false
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,push=${{ github.event.pull_request.head.repo.full_name == github.repository }}
          cache-from: type=registry,ref=${{ env.REGISTRY_IMAGE }}-cache
          cache-to: type=registry,ref=${{ env.REGISTRY_IMAGE }}-cache,mode=max
          target: dev
  test:
    name: test image
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ${{ needs.build-image.outputs.image }}
    steps:
      - name: Run tests
        run: |
          cd /tests
          bash test.sh
  trivy:
    name: trivy scan
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      pull-requests: write
    steps:
      - name: Run trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ needs.build-image.outputs.image }}
          format: "table"
          exit-code: "1"
          ignore-unfixed: false
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          output: trivy.txt
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish Trivy Output to PR Comment
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: mshick/add-pr-comment@ec328af66588ab8f77cdeb2c264f14aba45bbf59
        with:
          message-path: trivy.txt
