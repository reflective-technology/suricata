name: Pull Request Build
on:
  pull_request:
    branches:
      - main
env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}
jobs:
  build-image:
    name: build image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ${{ env.REGISTRY_IMAGE }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
        with:
          buildkitd-config-inline: ${{ vars.BUILDKITD_CONFIG }}
      - name: Login to GitHub Container Registry
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          platforms: linux/amd64
          provenance: false
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,push=${{ github.event.pull_request.head.repo.full_name == github.repository }}
          cache-from: type=registry,ref=${{ env.REGISTRY_IMAGE }}-cache
          cache-to: type=registry,ref=${{ env.REGISTRY_IMAGE }}-cache,mode=max
          target: prod
  test:
    name: test image
    needs: build-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build-image.outputs.image }}
    steps:
      - name: Run tests
        run: |
          echo "Running tests..."
          # Add your test commands here, for example:
          bash tests/test.sh
