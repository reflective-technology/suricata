name: Cleanup Pull Request Images
on:
  pull_request:
    types: [ closed ]
permissions:
  packages: write
jobs:
  ghcr-cleanup-image:
    name: ghcr cleanup action
    runs-on: ubuntu-latest
    steps:
      - name: Delete image
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4
        with:
          delete-tags: pr-${{github.event.pull_request.number}}
