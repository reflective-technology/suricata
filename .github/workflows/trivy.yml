name: Parse Docker Image Dependencies
on:
  push:
    branches:
      - main
    paths:
      - "VERSION"
env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}
jobs:
  build-image:
    name: build image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          flavor: latest=false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        with:
          buildkitd-config-inline: ${{ vars.BUILDKITD_CONFIG }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          platforms: linux/amd64
          provenance: false
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image
          cache-from: type=registry,ref=${{ env.REGISTRY_IMAGE }}-cache
          cache-to: type=registry,ref=${{ env.REGISTRY_IMAGE }}-cache,mode=max
          target: dev
  trivy:
    name: trivy parse the actual dependency results
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      packages: read
      contents: write
    steps:
      - name: update dependency
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.REGISTRY_IMAGE }}:${{ needs.build-image.outputs.version }}
          scan-type: image
          format: "github"
          output: "dependency-results.sbom.json"
          github-pat: ${{ secrets.GITHUB_TOKEN }}
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
