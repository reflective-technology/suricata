name: GHCR Cleanup
on:
  schedule:
    - cron: "20 4 * * sun" # every Sunday at 4:20 AM UTC
  workflow_dispatch:
permissions:
  packages: write
jobs:
  delete-untagged-images:
    name: Delete Untagged Images
    runs-on: ubuntu-latest
    steps:
      - uses: dataaxiom/ghcr-cleanup-action@34a2b6c814b9c6bcb92f78cba3e56a7ab9ca7a86
